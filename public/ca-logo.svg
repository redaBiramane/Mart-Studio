<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" fill="none">
  <!-- Monogramme CA -->
  <g>
    <!-- Soulignement -->
    <rect x="7" y="52" width="47" height="4.5" rx="1.2" fill="#006A4F"/>
    <!-- Lettre A (vert foncé) -->
    <path d="M17 50 L30 11 L35 11 L48 50 L40.5 50 L37.2 39.5 L25.4 39.5 L22 50 Z" fill="#006A4F"/>
    <!-- Contre-forme (creux du A) -->
    <path d="M27 34 L35.4 34 L31.3 20.5 Z" fill="#ffffff"/>
    <!-- Ruban « C » turquoise qui enveloppe -->
    <path d="M7 45
             C0.5 28, 15 9.5, 37 7.6
             C45.5 6.9, 53 9, 56.5 13
             C51.5 10.6, 44.5 10.4, 37.5 11.5
             C19.5 14, 9.5 28, 12.5 45 Z" fill="#009B9B"/>
    <!-- Accent rouge (drapeau) -->
    <path d="M50.5 7 L58 3.6 L61 8 L53.5 11.4 Z" fill="#E2001A"/>
  </g>
  <!-- Texte -->
  <text x="76" y="27" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="17" fill="#006A4F" letter-spacing="0.2">PERSONAL FINANCE</text>
  <text x="76" y="50" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="17" fill="#006A4F" letter-spacing="0.2">&amp; MOBILITY</text>
</svg>
