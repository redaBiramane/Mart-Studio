    <!-- Letter A shape -->
    <path d="M22 56 L38 8 L42 8 L58 56 L51 56 L47 44 L33 44 L29 56 Z" fill="#006B4F"/>
    <path d="M35 38 L45 38 L40 22 Z" fill="white"/>
    
